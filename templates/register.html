<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Daily Tasker</title>

    <!--CSS-->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
</head>
<body class="theme-light">

    <div class="auth-container">
        <div class="auth-form">

            <!-- Add this right after <div class="auth-form"> -->
            <div style="text-align: center; margin-bottom: 32px;">
                <div style="font-size: 48px; margin-bottom: 8px;"><img src="../static/images/logo.svg" alt="Daily Tasker Logo" style="width:100px;"></div>
                <h1 style="margin: 0; font-size: 32px; color: var(--button-bg);">My Daily Tasker</h1>
                <p style="margin: 8px 0 0 0; color: #666; font-size: 14px;">Track your daily progress, build lasting habits</p>
            </div>

            <h2>Register</h2>
            
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <ul class="flashes">
                        {% for message in messages %}
                            <li>{{ message }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password (min 8 characters)" required minlength="8">
                <button type="submit">Register</button>
            </form>
            <a href="{{ url_for('login') }}" class="auth-link">Already have an account?</a>
        </div>
    </div>

    <!--JS-->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
