<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Link - Daily Tasker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'theme-light';
            document.documentElement.className = savedTheme;
        })();
    </script>
</head>
<body class="theme-light">
    <div class="container" style="max-width: 600px; margin-top: 50px;">
        <div class="card" style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 32px;">
            <h2 style="text-align: center; margin-bottom: 24px;">🔗 Share Link Created!</h2>
            
            <div style="background: var(--bg-color); padding: 16px; border-radius: 8px; margin-bottom: 24px;">
                <p style="font-size: 14px; margin-bottom: 8px; color: var(--text-color);">
                    <strong>PDF Type:</strong> {{ pdf_type.capitalize() }}
                </p>
                <p style="font-size: 14px; margin-bottom: 16px; color: var(--text-color);">
                    <strong>Expires in:</strong> {{ expires_in }} days
                </p>
                
                <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-color);">
                    Shareable Link:
                </label>
                <div style="display: flex; gap: 8px;">
                    <input 
                        type="text" 
                        id="shareUrl" 
                        value="{{ share_url }}" 
                        readonly
                        style="flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--card-bg); color: var(--text-color); font-size: 14px;"
                        onclick="this.select()"
                    >
                    <button 
                        onclick="copyToClipboard()" 
                        class="btn"
                        style="white-space: nowrap;"
                    >
                        📋 Copy
                    </button>
                </div>
                
                <p id="copyMessage" style="color: var(--button-bg); font-size: 14px; margin-top: 8px; display: none;">
                    ✓ Link copied to clipboard!
                </p>
            </div>
            
            <div style="background: #FFF9E6; border: 1px solid #FFE066; border-radius: 8px; padding: 16px; margin-bottom: 24px;">
                <p style="font-size: 13px; color: #666; margin: 0;">
                    💡 <strong>Tip:</strong> Anyone with this link can view your {{ pdf_type }} PDF report without logging in. The link will expire in {{ expires_in }} days.
                </p>
            </div>
            
            <div style="display: flex; gap: 12px; justify-content: center;">
                <a href="{{ share_url }}" target="_blank" class="btn" style="text-decoration: none; display: inline-block;">
                    👁️ Preview PDF
                </a>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary" style="text-decoration: none; display: inline-block;">
                    ← Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
        function copyToClipboard() {
            const input = document.getElementById('shareUrl');
            input.select();
            input.setSelectionRange(0, 99999); // For mobile devices
            
            try {
                document.execCommand('copy');
                const message = document.getElementById('copyMessage');
                message.style.display = 'block';
                
                setTimeout(() => {
                    message.style.display = 'none';
                }, 3000);
            } catch (err) {
                alert('Failed to copy link. Please copy manually.');
            }
        }
        
        // Apply saved theme
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'theme-light';
            document.body.className = savedTheme;
        });
    </script>
</body>
</html>
